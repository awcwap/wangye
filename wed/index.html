<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频发布</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  #upload-box {
    margin-bottom: 20px;
    color: #fff;
  }
  video {
    max-width: 90%;
    max-height: 90vh;
    width: auto;
    height: auto;
    object-fit: contain;
    background: #111;
  }
</style>
</head>
<body>
  <div id="upload-box">
    <label for="video-input">选择一个视频文件：</label>
    <input type="file" id="video-input" accept="video/*">
  </div>
  <video id="video-player" controls>
    <source src="video.mp4" type="video/mp4">
    您的浏览器不支持 video 标签。
  </video>
<script>
  const input = document.getElementById('video-input');
  const player = document.getElementById('video-player');

  input.addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
      const url = URL.createObjectURL(file);
      player.src = url;
      player.load();
      player.play();
    }
  });
</script>
</body>
</html>
